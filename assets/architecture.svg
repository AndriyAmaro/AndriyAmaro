<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" fill="none">

  <!-- Design System Box -->
  <rect x="140" y="20" width="280" height="56" rx="8" fill="#0d1117" stroke="#6366f1" stroke-width="1.5" />
  <text x="280" y="44" text-anchor="middle" fill="#c7d2fe" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700">PULSE DESIGN SYSTEM</text>
  <text x="280" y="62" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="500">104+ Reusable Components</text>

  <!-- Lines from DS to apps -->
  <path d="M280,76 L280,110" stroke="#6366f1" stroke-width="1.5" fill="none" />
  <path d="M280,110 L100,110 L100,140" stroke="#6366f1" stroke-width="1.5" fill="none" />
  <path d="M280,110 L280,140" stroke="#6366f1" stroke-width="1.5" fill="none" />
  <path d="M280,110 L460,110 L460,140" stroke="#6366f1" stroke-width="1.5" fill="none" />

  <!-- Arrow heads -->
  <polygon fill="#6366f1" points="100,140 95,132 105,132" />
  <polygon fill="#6366f1" points="280,140 275,132 285,132" />
  <polygon fill="#6366f1" points="460,140 455,132 465,132" />

  <!-- Finance Box -->
  <rect x="30" y="142" width="140" height="72" rx="8" fill="#0d1117" stroke="#6366f1" stroke-width="1.5" />
  <text x="100" y="164" text-anchor="middle" fill="#818cf8" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600">FINANCE</text>
  <text x="100" y="180" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="500">Next.js + Hono</text>
  <text x="100" y="196" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="500">143 tests</text>

  <!-- Chat Box -->
  <rect x="210" y="142" width="140" height="72" rx="8" fill="#0d1117" stroke="#6366f1" stroke-width="1.5" />
  <text x="280" y="164" text-anchor="middle" fill="#818cf8" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600">CHAT</text>
  <text x="280" y="180" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="500">React + Express</text>
  <text x="280" y="196" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="500">98 tests</text>

  <!-- Coming Soon Box -->
  <rect x="390" y="142" width="140" height="72" rx="8" fill="#0d1117" stroke="#6366f1" stroke-width="1.5" />
  <text x="460" y="164" text-anchor="middle" fill="#818cf8" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600">COMING SOON</text>
  <text x="460" y="180" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="500">Vexiat · AI</text>
  <text x="460" y="196" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="500">CRM · LMS</text>

  <!-- Lines from apps to infra -->
  <path d="M100,214 L100,260" stroke="#06b6d4" stroke-width="1.5" fill="none" />
  <path d="M280,214 L280,260" stroke="#06b6d4" stroke-width="1.5" fill="none" />
  <path d="M460,214 L460,260" stroke="#06b6d4" stroke-width="1.5" fill="none" />
  <path d="M100,260 L460,260" stroke="#06b6d4" stroke-width="1.5" fill="none" />
  <path d="M280,260 L280,290" stroke="#06b6d4" stroke-width="1.5" fill="none" />

  <!-- Arrow head to infra -->
  <polygon fill="#06b6d4" points="280,290 275,282 285,282" />

  <!-- Infrastructure Box -->
  <rect x="80" y="292" width="400" height="56" rx="8" fill="#0d1117" stroke="#06b6d4" stroke-width="1.5" />
  <text x="280" y="316" text-anchor="middle" fill="#06b6d4" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600">SHARED INFRASTRUCTURE</text>
  <text x="280" y="334" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="500">PostgreSQL · Redis · Docker · CI/CD · Vercel</text>

</svg>
