<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" fill="none">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .box { fill: #0d1117; stroke: #6366f1; stroke-width: 1.5; rx: 8; }
    .box-infra { fill: #0d1117; stroke: #06b6d4; stroke-width: 1.5; rx: 8; }
    .line { stroke: #6366f1; stroke-width: 1.5; fill: none; }
    .line-infra { stroke: #06b6d4; stroke-width: 1.5; fill: none; }
    .title { fill: #c7d2fe; font-size: 13px; font-weight: 700; }
    .subtitle { fill: #94a3b8; font-size: 10px; font-weight: 500; }
    .label { fill: #818cf8; font-size: 11px; font-weight: 600; }
    .label-cyan { fill: #06b6d4; font-size: 11px; font-weight: 600; }
    .infra-text { fill: #94a3b8; font-size: 10px; font-weight: 500; }
  </style>

  <!-- Design System Box -->
  <rect class="box" x="140" y="20" width="280" height="56" />
  <text class="title" x="280" y="44" text-anchor="middle">PULSE DESIGN SYSTEM</text>
  <text class="subtitle" x="280" y="62" text-anchor="middle">104+ Reusable Components</text>

  <!-- Lines from DS to apps -->
  <path class="line" d="M280,76 L280,110" />
  <path class="line" d="M280,110 L100,110 L100,140" />
  <path class="line" d="M280,110 L280,140" />
  <path class="line" d="M280,110 L460,110 L460,140" />

  <!-- Arrow heads -->
  <polygon fill="#6366f1" points="100,140 95,132 105,132" />
  <polygon fill="#6366f1" points="280,140 275,132 285,132" />
  <polygon fill="#6366f1" points="460,140 455,132 465,132" />

  <!-- Finance Box -->
  <rect class="box" x="30" y="142" width="140" height="72" />
  <text class="label" x="100" y="164" text-anchor="middle">FINANCE</text>
  <text class="subtitle" x="100" y="180" text-anchor="middle">Next.js + Hono</text>
  <text class="subtitle" x="100" y="196" text-anchor="middle">143 tests</text>

  <!-- Chat Box -->
  <rect class="box" x="210" y="142" width="140" height="72" />
  <text class="label" x="280" y="164" text-anchor="middle">CHAT</text>
  <text class="subtitle" x="280" y="180" text-anchor="middle">React + Express</text>
  <text class="subtitle" x="280" y="196" text-anchor="middle">98 tests</text>

  <!-- Coming Soon Box -->
  <rect class="box" x="390" y="142" width="140" height="72" />
  <text class="label" x="460" y="164" text-anchor="middle">COMING SOON</text>
  <text class="subtitle" x="460" y="180" text-anchor="middle">Vexiat · AI</text>
  <text class="subtitle" x="460" y="196" text-anchor="middle">CRM · LMS</text>

  <!-- Lines from apps to infra -->
  <path class="line-infra" d="M100,214 L100,260" />
  <path class="line-infra" d="M280,214 L280,260" />
  <path class="line-infra" d="M460,214 L460,260" />
  <path class="line-infra" d="M100,260 L460,260" />
  <path class="line-infra" d="M280,260 L280,290" />

  <!-- Arrow head to infra -->
  <polygon fill="#06b6d4" points="280,290 275,282 285,282" />

  <!-- Infrastructure Box -->
  <rect class="box-infra" x="80" y="292" width="400" height="56" />
  <text class="label-cyan" x="280" y="316" text-anchor="middle">SHARED INFRASTRUCTURE</text>
  <text class="infra-text" x="280" y="334" text-anchor="middle">PostgreSQL · Redis · Docker · CI/CD · Vercel</text>

  <!-- Decorative dots -->
  <circle cx="28" cy="48" r="2" fill="#6366f1" opacity="0.3" />
  <circle cx="532" cy="48" r="2" fill="#06b6d4" opacity="0.3" />
  <circle cx="28" cy="320" r="2" fill="#06b6d4" opacity="0.3" />
  <circle cx="532" cy="320" r="2" fill="#6366f1" opacity="0.3" />
</svg>
